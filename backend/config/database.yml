default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: apartus_development

test:
  <<: *default
  database: apartus_test

production:
  primary: &primary_production
    <<: *default
    database: apartus_production
    username: apartus
    password: <%= ENV["APARTUS_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: apartus_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: apartus_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: apartus_production_cable
    migrations_paths: db/cable_migrate
